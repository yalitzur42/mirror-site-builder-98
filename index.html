  <style>
    #initial-splash {
      position: fixed; inset: 0; z-index: 9999;
      background: hsl(25, 50%, 20%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1.5rem;
      transition: opacity 0.4s ease;
    }
    #initial-splash.hide { opacity: 0; pointer-events: none; }
    #initial-splash svg { width: 6rem; height: 6rem; }
    #initial-splash .blade-top {
      transform-origin: 50px 50px;
      animation: splashScissorsTop 1.2s ease-in-out infinite;
    }
    #initial-splash .blade-bottom {
      transform-origin: 50px 50px;
      animation: splashScissorsBottom 1.2s ease-in-out infinite;
    }
    #initial-splash .label {
      color: hsl(60, 56%, 91%); font-weight: 800; letter-spacing: 0.2em;
      font-size: 1rem; text-transform: uppercase;
      font-family: system-ui, -apple-system, sans-serif;
    }
    @keyframes splashScissorsTop {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(-18deg); }
    }
    @keyframes splashScissorsBottom {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(18deg); }
    }
  </style>
</head>

  <body>
    <div id="initial-splash">
      <svg viewBox="0 0 100 100" fill="none" stroke="hsl(60, 56%, 91%)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="50" cy="50" r="3" fill="hsl(60, 56%, 91%)" />
        <g class="blade-top">
          <line x1="50" y1="50" x2="92" y2="22" />
          <circle cx="22" cy="68" r="10" />
          <line x1="50" y1="50" x2="30" y2="62" />
        </g>
        <g class="blade-bottom">
          <line x1="50" y1="50" x2="92" y2="78" />
          <circle cx="22" cy="32" r="10" />
          <line x1="50" y1="50" x2="30" y2="38" />
        </g>
      </svg>

    </div>
